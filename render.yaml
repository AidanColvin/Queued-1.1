# Render blueprint for the Queued backend (free tier friendly).
# The real 5,400-movie model artifacts are committed to the repo, so the service
# loads the trained recommender at startup with no data step. AUTO_SAMPLE stays
# on only as a fallback if the artifacts are ever missing.
databases:
  # Persistent Postgres for accounts, profiles, providers and the swipe log.
  # (Render's free Postgres expires after 30 days — upgrade the plan for a
  # long-lived deployment.)
  - name: queued-db
    plan: free

services:
  - type: web
    name: queued-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    # Apply schema migrations before each deploy goes live.
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: AUTO_SAMPLE
        value: "true"
      - key: MODEL_ARTIFACTS_PATH
        value: ./data/artifacts
      # Postgres connection string injected from the database above. SQLAlchemy
      # needs the psycopg3 dialect prefix; Render emits postgres://, so the app
      # normalizes the scheme at startup (see config.Settings).
      - key: DATABASE_URL
        fromDatabase:
          name: queued-db
          property: connectionString
      # Locked to the deployed SPA, local dev, and the Capacitor native shell.
      - key: CORS_ORIGINS
        value: https://queued.vercel.app,http://localhost:3000,capacitor://localhost,ionic://localhost
      - key: TMDB_API_KEY
        sync: false
      # ---- Accounts / auth (Phase 3) ----
      # Random secret that signs the session JWT (required).
      - key: JWT_SECRET
        sync: false
      # Send the auth cookie with Secure (HTTPS).
      - key: COOKIE_SECURE
        value: "true"
      # SPA origin the OAuth callback redirects back to.
      - key: FRONTEND_URL
        value: https://queued.vercel.app
      # Google OAuth client (Google Cloud Console). Absent → email/password only;
      # "Continue with Google" returns 503. Redirect URI must be
      # https://<this-backend-host>/auth/google/callback (or /api/... on Vercel).
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
