# Real browser (headless Chrome via Playwright) interaction tests. The dev
# sandbox can neither download a browser nor reach the deploy, so these run
# here in CI against a local static export + the sample-bundle backend.
name: E2E

on:
  push:
    branches: [main]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # --- Backend (sample bundle, SQLite) in the background ---
      - name: Install backend deps
        working-directory: backend
        run: pip install -r requirements.txt
      - name: Start backend
        working-directory: backend
        env:
          AUTO_SAMPLE: "true"
          DATABASE_URL: "sqlite:///./e2e.db"
          JWT_SECRET: "e2e-secret"
          CORS_ORIGINS: "http://localhost:3000"
          COOKIE_SECURE: "false"
          FRONTEND_URL: "http://localhost:3000"
          RATE_LIMIT_ENABLED: "false"
        run: |
          uvicorn main:app --host 0.0.0.0 --port 8000 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      # --- Frontend: build against the local backend, serve the static export ---
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:8000"
        run: npm run build
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Serve build + run E2E
        working-directory: frontend
        run: |
          python3 -m http.server 3000 --directory out &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/ >/dev/null && break
            sleep 1
          done
          npm run e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
