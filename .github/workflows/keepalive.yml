# Keep the free-tier backend warm so visitors don't hit a cold start.
#
# The Vercel serverless function idles and the Neon free Postgres auto-suspends
# after a few minutes; the first request afterwards pays a slow cold start +
# DB resume. Pinging /api/health every ~5 minutes keeps both warm.
#
# Caveats (free tier): GitHub's scheduled runs are best-effort — they can be
# delayed or skipped under load, and the minimum interval is 5 minutes, while
# Neon suspends at ~5 minutes idle, so an occasional cold start can still slip
# through. For a hard guarantee, use an external uptime pinger (UptimeRobot /
# cron-job.org) at a 1–3 minute interval, or upgrade off the auto-suspend tier.
name: keepalive

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes
  workflow_dispatch: {} # allow manual runs

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Warm the backend (function + DB)
        run: |
          for path in /api/health "/api/popular"; do
            echo "pinging ${path}"
            if [ "${path}" = "/api/popular" ]; then
              curl -fsS -m 30 -X POST "https://nextwatch-rouge.vercel.app${path}" \
                -H 'Content-Type: application/json' -d '{"count":1,"exclude_ids":[]}' >/dev/null || true
            else
              curl -fsS -m 30 "https://nextwatch-rouge.vercel.app${path}" >/dev/null || true
            fi
          done
          echo "warm-up complete"
